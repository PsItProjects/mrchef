name: Android - Build Google Play AAB

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: android-google-play-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_aab:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare .env (CI)
        env:
          DOTENV_FILE_BASE64: ${{ secrets.DOTENV_FILE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -n "${DOTENV_FILE_BASE64:-}" ]]; then
            echo "$DOTENV_FILE_BASE64" | base64 -d > .env
          elif [[ -f .env.example ]]; then
            cp .env.example .env
          else
            printf "# Generated by GitHub Actions\n" > .env
          fi

      - name: Setup Firebase google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -n "${GOOGLE_SERVICES_JSON_BASE64:-}" ]]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          elif [[ ! -f android/app/google-services.json ]]; then
            echo "Missing android/app/google-services.json or GOOGLE_SERVICES_JSON_BASE64 secret." >&2
            exit 1
          fi

      - name: Setup Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES_BASE64: ${{ secrets.ANDROID_KEY_PROPERTIES_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -n "${ANDROID_KEY_PROPERTIES_BASE64:-}" ]]; then
            echo "$ANDROID_KEY_PROPERTIES_BASE64" | base64 -d > android/key.properties
          fi
          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/mrchef-release-key.jks
          fi
          if [[ ! -f android/key.properties ]]; then
            echo "Missing android/key.properties or ANDROID_KEY_PROPERTIES_BASE64 secret." >&2
            exit 1
          fi
          if [[ ! -f android/mrchef-release-key.jks ]]; then
            echo "Missing android/mrchef-release-key.jks or ANDROID_KEYSTORE_BASE64 secret." >&2
            exit 1
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Google Play App Bundle
        run: |
          set -euo pipefail
          VERSION_LINE=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          BUILD_NAME=${VERSION_LINE%%+*}
          if [[ "$VERSION_LINE" == *"+"* ]]; then
            BASE_NUMBER=${VERSION_LINE#*+}
          else
            BASE_NUMBER=0
          fi
          BUILD_NUMBER=$((BASE_NUMBER + GITHUB_RUN_NUMBER))
          echo "Using build-name=$BUILD_NAME build-number=$BUILD_NUMBER"
          flutter build appbundle --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 14